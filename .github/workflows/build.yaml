name: Build ImmortalWrt R5S

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone ImmortalWrt
      run: |
        git clone https://github.com/immortalwrt/immortalwrt
        cd immortalwrt

    - name: Add packages
      run: |
        cd immortalwrt
        bash ../scripts/packages.sh

    - name: Copy config
      run: |
        cd immortalwrt
        cp ../config/r5s.config .config
        make defconfig

    - name: Build firmware
      run: |
        cd immortalwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v3
      with:
        name: firmware
        path: immortalwrt/bin/targets/